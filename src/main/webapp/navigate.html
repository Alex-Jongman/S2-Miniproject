<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="navigate.css" />

    <title>HUfteling</title>

    <script type="module" src="./src/view/pages/navigation-page.js"></script>
</head>
<body>
    <header>
        <h1>De HUfteling</h1>
    </header>
    <footer>
        <p>&copy; 2026 HU-S2.</p>
    </footer>
    <main>
        <h2 class="location-title">locatie</h2>
        <img id="location-image" src="" alt="locatie">
        <nav>
            <button id="north-west">&#8598;</button>
            <button id="north">&#8593;</button>
            <button id="north-east">&#8599;</button>
            <button id="west">&#8592;</button>
            <button id="center" disabled>X</button>
            <button id="east">&#8594;</button>
            <button id="south-west">&#8601;</button>
            <button id="south">&#8595;</button>
            <button id="south-east">&#8600;</button>
        </nav>
    </main>
    <aside>

        <section class="map-section">
            <h2>Plattegrond</h2>
            <img src="./images/plattegrond.png" alt="Plattegrond" />
        </section>

        <section class="todo-section">
            <h2>TODO</h2>
            <ul class="todo-list">
            </ul>

            <form id="todo-form">
                <input type="text" id="todo" name="todo" placeholder="Voeg een nieuwe taak toe..." />
                <button type="submit">Toevoegen</button>
            </form>
        </section>

        <template id="todo-item-template">
            <li>
                <input type="checkbox" class="location-checkbox" name="" id="" />
                <label for="" class="location-label"></label>
                <button class="delete-button">Verwijderen</button>
            </li>
        </template>
    </aside>
</body>
</html>
